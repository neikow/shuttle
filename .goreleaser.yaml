version: 2
project_name: shuttle

before:
  hooks:
    - go mod download
    # Build the React UI so the embedui tag can embed web/dist. GoReleaser splits
    # each hook into argv and execs it directly (no shell), so `cd web && …`
    # would try to exec "cd"; wrap in `sh -c` to get a shell for the cd + chain.
    - sh -c "cd web && npm ci"
    - sh -c "cd web && npm run build"

builds:
  - id: shuttle
    main: ./cmd/shuttle
    binary: shuttle
    flags:
      - -tags=embedui
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.Commit={{ .ShortCommit }}

archives:
  - id: shuttle
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# Software Bill of Materials, one per release archive (syft). Lets consumers
# audit the dependency set of each shipped binary.
sboms:
  - artifacts: archive

# Keyless cosign signature over checksums.txt. Because the checksum file lists
# every archive's hash, one signature transitively covers all archives. Keyless
# (Fulcio/Rekor, OIDC) means no long-lived signing key to manage or leak — the
# release job's GitHub OIDC identity is the signer. Verify with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/neikow/shuttle/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     checksums.txt
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github

dockers:
  - image_templates:
      - "ghcr.io/neikow/shuttle:{{ .Version }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/neikow/shuttle:{{ .Version }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/neikow/shuttle:{{ .Version }}"
    image_templates:
      - "ghcr.io/neikow/shuttle:{{ .Version }}-amd64"
      - "ghcr.io/neikow/shuttle:{{ .Version }}-arm64"
  - name_template: "ghcr.io/neikow/shuttle:latest"
    image_templates:
      - "ghcr.io/neikow/shuttle:{{ .Version }}-amd64"
      - "ghcr.io/neikow/shuttle:{{ .Version }}-arm64"

# Keyless cosign signatures over the published images and multi-arch manifests
# (signed by digest). Verify with:
#   cosign verify ghcr.io/neikow/shuttle:<version> \
#     --certificate-identity-regexp 'https://github.com/neikow/shuttle/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
docker_signs:
  - cmd: cosign
    artifacts: all
    args:
      - sign
      - "${artifact}"
      - "--yes"
    output: true
