version: "2"
linters:
  enable:
    - staticcheck
    - govet
    - errcheck
    - ineffassign
    - unused
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck
  exclusions:
    rules:
      # Tests use httptest.NewRequest / exec.Command and ignore best-effort
      # errors freely; that noise is not worth gating CI on.
      - path: _test\.go
        linters:
          - errcheck
          - noctx
