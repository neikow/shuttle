version: "2"
linters:
  enable:
    - staticcheck
    - govet
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - bodyclose
    - contextcheck
    - noctx
    - sqlclosecheck
    - rowserrcheck
linters-settings:
  govet:
    enable-all: true
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
