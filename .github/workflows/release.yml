name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push images to ghcr.io
  id-token: write # keyless cosign signing via GitHub OIDC (Fulcio/Rekor)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          # Match CI: 1.26 ships the patched stdlib so released binaries are not
          # built against the versions govulncheck flags.
          go-version: "1.26"
          cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # cosign for keyless signing of archives + images; syft for SBOMs. Both
      # are invoked by GoReleaser (signs / docker_signs / sboms) and must be on
      # PATH before the release step runs.
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
