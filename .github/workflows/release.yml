name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push images to ghcr.io
  id-token: write # keyless cosign signing via GitHub OIDC (Fulcio/Rekor)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          # Match CI: 1.26 ships the patched stdlib so released binaries are not
          # built against the versions govulncheck flags.
          go-version: "1.26"
          cache: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # cosign for keyless signing of archives + images; syft for SBOMs. Both
      # are invoked by GoReleaser (signs / docker_signs / sboms) and must be on
      # PATH before the release step runs.
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # shuttle-caddy: stock Caddy + the DNS-challenge provider plugins. Built
      # separately from the binary images (it's an xcaddy build, not a GoReleaser
      # artifact). Tagged with the release version so the agent's version-aligned
      # default (defaultCaddyImage) always resolves, plus :latest.
      - name: Build and push shuttle-caddy image
        id: caddy_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/neikow/shuttle-caddy:${{ github.ref_name }}
            ghcr.io/neikow/shuttle-caddy:latest

      # Keyless cosign signature over the image digest, matching the binary
      # images' supply-chain posture (Fulcio/Rekor via the job's GitHub OIDC).
      - name: Sign shuttle-caddy image
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.caddy_build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/neikow/shuttle-caddy@${DIGEST}"
