name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -count=1 -race ./internal/... ./cmd/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Build golangci-lint from source with the runner's Go (1.25) so its
          # build version is not lower than the module's go directive (1.25.7);
          # the prebuilt binaries lag at go1.24 and refuse to load the config.
          install-mode: goinstall

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          # Inline GitHub annotations only; skip the PR summary comment so the
          # job does not require pull-requests:write on the default token.
          pr_comment: false
          lint: true
          breaking: true
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main"
