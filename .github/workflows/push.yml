name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # 1.26 carries the stdlib security fixes (crypto/x509, crypto/tls,
          # html/template, net/http, net/textproto) that govulncheck flags on
          # older patch lines. The module's go directive (1.25.x) is unchanged.
          go-version: "1.26"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Vulncheck
        # Gate on known vulnerabilities the code actually reaches. Bumps to the
        # Go toolchain or a flagged dependency are required to keep this green.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Unit tests
        run: go test -count=1 -race ./internal/... ./cmd/...

      - name: golangci-lint
        # v8 targets golangci-lint v2 (our .golangci.yml is v2 format); v6/v7
        # install v1 and reject the v2 config. goinstall builds with the
        # runner's Go (1.25) so the binary is not older than the module's go
        # directive (1.25.7) — prebuilt binaries lag at go1.24.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          install-mode: goinstall

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          # Inline GitHub annotations only; skip the PR summary comment so the
          # job does not require pull-requests:write on the default token.
          pr_comment: false
          lint: true
          breaking: true
          breaking_against: "https://github.com/${{ github.repository }}.git#branch=main"
