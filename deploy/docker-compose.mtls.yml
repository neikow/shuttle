# mTLS overlay for the dev stack. Layer on top of docker-compose.yml:
#   make certs
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.mtls.yml up --build
#
# `make certs` writes ../certs/{ca,orchestrator,agent}.{crt,key} with the
# orchestrator cert carrying SAN DNS:orchestrator (matches --server-name below).
# With these in place the orchestrator requires and verifies client certs;
# insecure agents are rejected.
services:
  orchestrator:
    volumes:
      # Override the base config mount with the TLS-enabled variant.
      - ./config.mtls.example.yml:/etc/shuttle/config.yml:ro
      - ../certs:/etc/shuttle/certs:ro

  agent:
    command:
      - "agent"
      - "--orchestrator"
      - "orchestrator:9090"
      - "--host"
      - "web1"
      - "--work-dir"
      - "/var/lib/shuttle-agent"
      - "--cert"
      - "/etc/shuttle/certs/agent.crt"
      - "--key"
      - "/etc/shuttle/certs/agent.key"
      - "--ca"
      - "/etc/shuttle/certs/ca.crt"
      - "--server-name"
      - "orchestrator"
    volumes:
      - ../certs:/etc/shuttle/certs:ro
