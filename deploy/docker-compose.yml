# Local dev stack: orchestrator + agent + Caddy.
# Usage: docker compose -f deploy/docker-compose.yml up --build
#
# The orchestrator's HTTP control plane is exposed on :8080 and gRPC on :9090.
# Caddy's admin API (:2019) is reachable by the orchestrator for route updates.
# The agent dials the orchestrator over an INSECURE gRPC channel by default.
#
# For mutual-TLS, run `make certs` then layer the override:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.mtls.yml up --build
services:
  orchestrator:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["orchestrator", "--config", "/etc/shuttle/config.yml"]
    ports:
      - "8080:8080" # HTTP control plane
      - "9090:9090" # gRPC (agents dial in)
    volumes:
      - ./config.example.yml:/etc/shuttle/config.yml:ro
      - shuttle-data:/var/lib/shuttle
    depends_on:
      - caddy
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: Dockerfile
    command:
      - "agent"
      - "--orchestrator"
      - "orchestrator:9090"
      - "--host"
      - "web1"
      - "--work-dir"
      - "/var/lib/shuttle-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # required to run compose deploys
      - agent-work:/var/lib/shuttle-agent
    depends_on:
      - orchestrator
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019" # admin API
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  shuttle-data:
  agent-work:
  caddy-data:
  caddy-config:
