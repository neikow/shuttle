# Orchestrator config. Copy to config.yml and edit.
bearer_token: "change-me"          # required; auth for the HTTP control plane
grpc_addr: ":9090"
http_addr: ":8080"
data_dir: /var/lib/shuttle         # SQLite ledger lives here

# Git sync + webhook (optional). Set both repo_url and webhook_secret to enable
# POST /webhook and the drift reconcile loop.
# repo_url: "https://github.com/you/your-iac-repo.git"
# repo_branch: "main"
# repo_dir: ""                     # defaults to <data_dir>/repo
# webhook_secret: "change-me-too"

# Central Caddy admin API for ingress route push (optional, legacy). Leave empty
# to use agent-managed Caddy sidecars instead: start the agent with --caddy and
# the orchestrator pushes each host's routes over gRPC (CaddyConfigRequest).
caddy_admin_url: ""

# Redirect HTTP to HTTPS. When true, Caddy serves :443 only and 308-redirects
# :80 -> HTTPS (ACME HTTP-01 challenges still answered on :80). When false,
# :80 is served plaintext with no redirect.
https_redirect: false

# Secrets provider for rendering service env (optional). "infisical" reads
# INFISICAL_CLIENT_ID/_SECRET/_PROJECT_ID from the environment. Default "none"
# means env passthrough is off.
secrets_provider: "none"

# Infisical folder layout (only used with secrets_provider: infisical). Each
# service reads the shared base folder merged with its own folder; a service's
# secret_path overrides the template. Both must be absolute. Default base
# "/shared"; no template means every service reads only the base.
# secrets_base_path: "/shared"
# secrets_path_template: "/services/{service}"

# Infisical webhook (optional). Set infisical_webhook_secret to enable
# POST /webhook/infisical: Infisical secret-change webhooks are authenticated
# (HMAC) and only the services reading the changed folder are redeployed.
# A burst of edits is coalesced over infisical_webhook_debounce (default 5s).
# infisical_webhook_secret: "change-me-infisical"
# infisical_webhook_debounce: "5s"

# gRPC TLS (optional). Unset here => the gRPC transport is insecure (dev only).
#   cert + key      => orchestrator serves TLS (pair with agent_token_auth below).
#   cert + key + ca => mutual TLS: agents must present a client cert.
# For the mTLS dev stack use config.mtls.example.yml via docker-compose.mtls.yml
# (run `make certs` first). To enable manually:
# grpc_tls_cert: /etc/shuttle/certs/orchestrator.crt
# grpc_tls_key: /etc/shuttle/certs/orchestrator.key
# grpc_tls_ca: /etc/shuttle/certs/ca.crt

# Agent token enrollment (optional). When true, agents must present a valid
# bearer token (minted by `shuttle enroll`) to register. Pair with server TLS
# above so the token is encrypted in transit. The advertise_* values are baked
# into the agent command that `shuttle enroll` prints.
# agent_token_auth: true
# advertise_addr: "orchestrator.example.com:9090"   # gRPC host:port agents dial
# advertise_server_name: "orchestrator"             # SAN on the orchestrator cert
